name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      options:
        - token-tracker
        - New plugin idea
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature or improvement.
      placeholder: Describe what you'd like to see...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: What problem does this solve or what workflow does it improve?
      placeholder: Explain the use case...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of.
    validations:
      required: false